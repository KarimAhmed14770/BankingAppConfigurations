
server:
  port: 8031

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

eureka:
  instance:
    preferIpAddress: true

  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8091/eureka/

info:
  app:
    name: "cards-prod"
    description: "cards microservice-prod"
    version: "1.3"
